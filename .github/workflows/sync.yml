name: Sync and build

# Runs every 6 hours plus manual trigger from the Actions tab.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Sync from Substack
        run: npm run sync

      - name: Build site
        run: npm run build

      - name: Build search index
        run: npm run search-index

      # Commit the updated data/posts.json so future builds are reproducible
      # and you can see exactly what changed in each sync via git diff.
      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git diff --staged --quiet || git commit -m "chore: sync Substack feed [skip ci]"
          git push
        continue-on-error: true

